<!-- public/turmas/index.html -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Turmas - SIGMA</title>
</head>
<body>
    <h1>Turmas</h1>

    <p>Logado como {{ usuario.nome }} ({{ usuario.tipo }})</p>

    <p>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/turmas/nova">Nova turma</a>
    </p>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Ano</th>
                <th>Curso</th>
                <th>Semestre</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for turma in turmas %}
            <tr>
                <td>{{ turma.id_turma }}</td>
                <td>{{ turma.ano }}</td>
                <td>{{ mapa_cursos.get(turma.curso_id, "—") }}</td>
                <td>{{ turma.semestre }}</td>
                <td>
                    <a href="/turmas/{{ turma.id_turma }}/editar">Editar</a>

                    <form method="post"
                          action="/turmas/{{ turma.id_turma }}/excluir"
                          style="display:inline;">
                        <button type="submit">Excluir</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
