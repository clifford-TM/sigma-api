<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar turma - SIGMA</title>
</head>
<body>
    <h1>Gerenciar turma</h1>

    <p>
        Turma: {{ curso.codigo }} - {{ curso.nome }} |
        Ano: {{ turma.ano }} |
        Semestre: {{ turma.semestre }}
    </p>

    <form method="post" action="/turmas/{{ turma.id_turma }}/gerenciar">
        <table border="1">
            <thead>
                <tr>
                    <th>Matéria</th>
                    <th>Professor responsável</th>
                </tr>
            </thead>
            <tbody>
                {% for item, materia in grade %}
                <tr>
                    <td>{{ materia.codigo }} - {{ materia.nome }}</td>
                    <td>
                        <select name="professor_materia_{{ materia.id_materia }}">
                            <option value="">Selecione</option>
                            {% for professor, usuario_prof in professores_por_materia.get(materia.id_materia, []) %}
                                <option
                                    value="{{ professor.id_professor }}"
                                    {% if professor_selecionado.get(materia.id_materia) == professor.id_professor %}
                                        selected
                                    {% endif %}
                                >
                                    {{ usuario_prof.nome }}
                                </option>
                            {% endfor %}
                        </select>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <br>
        <button type="submit">Salvar professores da turma</button>
    </form>

    <p>
        <a href="/turmas/">Voltar para turmas</a>
    </p>
</body>
</html>
