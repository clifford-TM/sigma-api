<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar dispositivo - SIGMA</title>

    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/form.css">
    <script src="/static/js/form.js" defer></script>
</head>
<body>
    <div class="form-page">
        <main class="form-shell">

            <header class="form-header">
                <a href="/dispositivos" class="text-link">
                    ← Voltar para dispositivos
                </a>

                <div>
                    <p class="eyebrow">Infraestrutura embarcada</p>

                    <h1>Cadastrar dispositivo</h1>

                    <p class="subtitle">
                        Registre dispositivos responsáveis pelo monitoramento e controle dos ambientes.
                    </p>
                </div>
            </header>

            {% if erro %}
                <div class="form-alert">
                    {{ erro }}
                </div>
            {% endif %}

            <section class="section-card form-card">
                <form action="/dispositivos" method="post" class="sigma-form">

                    <div class="form-grid">

                        <div class="form-group">
                            <label for="nome">Nome</label>

                            <input
                                type="text"
                                id="nome"
                                name="nome"
                                value="{{ valores.nome if valores else '' }}"
                                placeholder="Ex: Controlador Laboratório 01"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="sala_id">Sala vinculada</label>

                            <select id="sala_id" name="sala_id" required>
                                <option value="">Selecione</option>

                                {% for sala in salas %}
                                    <option
                                        value="{{ sala.id_sala }}"
                                        {% if valores and valores.sala_id == sala.id_sala %}selected{% endif %}
                                    >
                                        {{ sala.numero }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group form-group-full">
                            <label for="identificador_fisico">
                                Identificador físico
                            </label>

                            <input
                                type="text"
                                id="identificador_fisico"
                                name="identificador_fisico"
                                value="{{ valores.identificador_fisico if valores else '' }}"
                                placeholder="Ex: esp32_lab01_ctrl"
                                required
                            />

                            <small class="form-help">
                                Identificador utilizado pelo dispositivo para comunicação com o sistema.
                            </small>
                        </div>

                        <div class="form-group form-group-full">
                            <label class="checkbox-group">
                                <input
                                    type="checkbox"
                                    id="ativo"
                                    name="ativo"
                                    {% if not valores or valores.ativo %}checked{% endif %}
                                />

                                <span>Dispositivo ativo</span>
                            </label>
                        </div>

                    </div>

                    <div class="form-actions">
                        <a href="/dispositivos" class="secondary-button">
                            Cancelar
                        </a>

                        <button type="submit" class="primary-button">
                            Salvar dispositivo
                        </button>
                    </div>

                </form>
            </section>

        </main>
    </div>
</body>
</html>
