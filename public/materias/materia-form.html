<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>
        {% if materia %}
            Editar matéria
        {% else %}
            Nova matéria
        {% endif %}
    </title>
</head>
<body>
    <h1>
        {% if materia %}
            Editar matéria
        {% else %}
            Nova matéria
        {% endif %}
    </h1>

    {% if erro %}
        <p style="color:red;">{{ erro }}</p>
    {% endif %}

    <form method="post"
          action="{% if materia %}/materias/{{ materia.id_materia }}/editar{% else %}/materias/nova{% endif %}">
        <label>Nome:</label><br>
        <input type="text" name="nome"
               value="{{ materia.nome if materia else '' }}"
               required><br><br>

        <label for="curso_id">Curso:</label><br>
        <select id="curso_id" name="curso_id" required>
            <option value="">Selecione</option>
            {% for curso in cursos %}
                <option value="{{ curso.id_curso }}"
                    {% if materia and materia.curso_id == curso.id_curso %}selected{% endif %}>
                    {{ curso.nome }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Semestre:</label><br>
        <input type="number" name="semestre"
               min="1" max="12"
               value="{{ materia.semestre if materia else '' }}"
               required><br><br>

        <button type="submit">Salvar</button>
    </form>

    <p><a href="/materias/">Voltar</a></p>
</body>
</html>
