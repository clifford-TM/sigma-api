<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>
        {% if materia %}
            Editar matéria
        {% else %}
            Nova matéria
        {% endif %}
    </title>
</head>
<body>
    <h1>
        {% if materia %}
            Editar matéria
        {% else %}
            Nova matéria
        {% endif %}
    </h1>

    {% if erro %}
        <p style="color:red;">{{ erro }}</p>
    {% endif %}

    <form method="post"
          action="{% if materia %}/materias/{{ materia.id_materia }}/editar{% else %}/materias/nova{% endif %}">

        <label for="codigo">Código:</label><br>
        <input
            type="text"
            id="codigo"
            name="codigo"
            value="{{ materia.codigo if materia else '' }}"
            required
        ><br><br>

        <label for="nome">Nome:</label><br>
        <input
            type="text"
            id="nome"
            name="nome"
            value="{{ materia.nome if materia else '' }}"
            required
        ><br><br>

        <label for="professores_ids">
            Professores que podem ministrar esta matéria:
        </label><br>

        <select
            id="professores_ids"
            name="professores_ids"
            multiple
            size="6"
            style="min-width: 300px;"
        >
            {% for professor, usuario in professores %}
                <option
                    value="{{ professor.id_professor }}"
                    {% if professores_selecionados and professor.id_professor in professores_selecionados %}
                        selected
                    {% endif %}
                >
                    {{ usuario.nome }}
                </option>
            {% endfor %}
        </select>

        <br>
        <small style="color:#555;">
            Segure Ctrl (ou Cmd no Mac) para selecionar mais de um professor.
        </small>

        <br><br>

        <button type="submit">Salvar</button>
    </form>

    <p><a href="/materias/">Voltar</a></p>
</body>
</html>
