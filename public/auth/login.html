<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SIGMA — Login</title>
    <meta
      name="description"
      content="Acesso ao SIGMA — Sistema de Gerenciamento e Monitoramento de Ambientes"
    />
  </head>
  <body>
    <header role="banner">
      <h1>SIGMA</h1>
      <p>Sistema de Gerenciamento e Monitoramento de Ambientes</p>
    </header>

    <main role="main">
      <section id="mensagens" aria-live="polite" aria-atomic="true">
        {% if erro %}
          <div class="erro">{{ erro }}</div>
        {% endif %}
      </section>

      <section aria-labelledby="titulo-credenciais">
        <h2 id="titulo-credenciais">Entrar com credenciais</h2>

        <form id="login-form" method="post" action="/login" novalidate>
          <div>
            <label for="email">E-mail institucional</label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="username"
              inputmode="email"
              required
            />
          </div>

          <div>
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              autocomplete="current-password"
              minlength="6"
              required
            />
          </div>

          <div>
            <input type="checkbox" id="lembrar" name="remember" />
            <label for="lembrar">Permanecer conectado</label>
          </div>

          <div>
            <button type="submit">Entrar</button>
          </div>
        </form>
      </section>

      <section aria-labelledby="titulo-rfid">
        <h2 id="titulo-rfid">Entrar com RFID</h2>
        <p>Autenticação por RFID ainda não está disponível nesta versão do protótipo.</p>
      </section>

      <nav aria-label="Ações auxiliares">
        <ul>
          <li><a href="#">Esqueci minha senha</a></li>
          <li><a href="#">Suporte</a></li>
        </ul>
      </nav>

      <noscript>
        <p>Alguns recursos podem exigir JavaScript habilitado.</p>
      </noscript>
    </main>

    <footer role="contentinfo">
      <small>© <span id="ano">2025</span> SIGMA • v0.1 • Ambiente de testes</small>
    </footer>

    <script>
      (function () {
        var el = document.getElementById("ano");
        if (el) el.textContent = new Date().getFullYear();
      })();
    </script>
  </body>
</html>
