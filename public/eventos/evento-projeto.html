<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo projeto - SIGMA</title>
</head>
<body>
    <h1>Novo projeto</h1>

    <p>Bem-vindo, {{ usuario.nome }}</p>

    {% if erro %}
        <p style="color:red;">{{ erro }}</p>
    {% endif %}

    <form method="post" action="/eventos">
        <input type="hidden" name="tipo" value="projeto">

        {% if usuario.tipo == "aluno" %}
            <div>
                <label for="autorizado_por">Professor responsável</label><br>
                <select id="autorizado_por" name="autorizado_por" required>
                    <option value="">Selecione</option>
                    {% for professor in professores %}
                        <option
                            value="{{ professor.id_usuario }}"
                            {% if valores and valores.autorizado_por == professor.id_usuario %}selected{% endif %}
                        >
                            {{ professor.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <br>
        {% endif %}

        <div>
            <label for="sala_id">Sala</label><br>
            <select id="sala_id" name="sala_id" required>
                <option value="">Selecione</option>
                {% for sala in salas %}
                    <option
                        value="{{ sala.id_sala }}"
                        {% if valores and valores.sala_id == sala.id_sala %}selected{% endif %}
                    >
                        {{ sala.numero }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <br>

        <div>
            <label for="inicio_previsto">Início previsto</label><br>
            <input
                type="datetime-local"
                id="inicio_previsto"
                name="inicio_previsto"
                value="{{ valores.inicio_previsto if valores else '' }}"
                required
            />
        </div>

        <br>

        <div>
            <label for="fim_previsto">Fim previsto</label><br>
            <input
                type="datetime-local"
                id="fim_previsto"
                name="fim_previsto"
                value="{{ valores.fim_previsto if valores else '' }}"
                required
            />
        </div>

        <br>

        <div>
            <label for="descricao">Descrição do projeto</label><br>
            <textarea
                id="descricao"
                name="descricao"
                rows="4"
                cols="50"
            >{{ valores.descricao if valores else '' }}</textarea>
        </div>

        <br>

        <button type="submit">Agendar projeto</button>
    </form>

    <p>
        <a href="/eventos">Voltar para eventos</a>
    </p>
</body>
</html>
