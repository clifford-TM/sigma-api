<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Usuários - SIGMA</title>
</head>
<body>
  <h1>Usuários</h1>

  <p>Logado como {{ usuario.nome }} ({{ usuario.tipo }})</p>

  <p>
    <a href="/dashboard">Dashboard</a>
    <a href="/usuarios/novo">Novo usuário</a>
    <a href="/logout">Sair</a>
  </p>

  <table border="1" cellpadding="8">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Tipo</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody>
      {% for u in usuarios %}
      <tr>
        <td>{{ u.id_usuario }}</td>
        <td>{{ u.nome }}</td>
        <td>{{ u.tipo }}</td>
        <td>{{ u.email }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
